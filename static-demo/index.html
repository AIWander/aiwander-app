<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AIWander</title>
<meta name="description" content="AI agent chat with live browser preview — runs entirely on AMD MI300X" />
<style>
  :root {
    --bg: #0a0a0a; --bg-elev: #141414; --fg: #fafafa; --muted: #888;
    --border: #2a2a2a; --accent: #fafafa; --accent-fg: #0a0a0a;
    --tool: #4a9eff; --result-ok: #4ade80; --result-err: #f87171;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg); color: var(--fg);
    font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    font-size: 14px; line-height: 1.5; }
  body { display: flex; flex-direction: column; }
  header { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 16px; flex-wrap: wrap; }
  header h1 { margin: 0; font-size: 16px; font-weight: 600; letter-spacing: -0.01em; }
  header .tagline { color: var(--muted); font-size: 12px; }
  header .status { margin-left: auto; display: flex; gap: 12px; font-size: 12px; }
  .pill { padding: 3px 10px; border-radius: 999px; background: var(--bg-elev); border: 1px solid var(--border); color: var(--muted); }
  .pill.ok { color: var(--result-ok); border-color: rgba(74, 222, 128, 0.3); }
  .pill.err { color: var(--result-err); border-color: rgba(248, 113, 113, 0.3); }
  main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; gap: 0; min-height: 0; }
  @media (max-width: 768px) { main { grid-template-columns: 1fr; } }
  .pane { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .pane + .pane { border-left: 1px solid var(--border); }
  .pane-head { padding: 10px 16px; border-bottom: 1px solid var(--border); font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .scroll { flex: 1; overflow-y: auto; padding: 16px; }
  .scroll::-webkit-scrollbar { width: 6px; }
  .scroll::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 3px; }
  .msg { padding: 10px 14px; border-radius: 8px; margin-bottom: 10px; max-width: 90%; word-wrap: break-word; }
  .msg.user { background: var(--accent); color: var(--accent-fg); margin-left: auto; }
  .msg.assistant { background: var(--bg-elev); border: 1px solid var(--border); }
  .msg.assistant pre { white-space: pre-wrap; margin: 0; font-family: inherit; }
  .tool-call { background: var(--bg-elev); border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px; margin-bottom: 8px; font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
  .tool-call .name { color: var(--tool); font-weight: 600; }
  .tool-call .args { color: var(--muted); margin-top: 4px; word-break: break-all; }
  .tool-call .result { margin-top: 6px; padding-top: 6px; border-top: 1px solid var(--border); }
  .tool-call .result.ok { color: var(--result-ok); }
  .tool-call .result.err { color: var(--result-err); }
  .iter { color: var(--muted); font-size: 11px; margin: 12px 0 4px; text-transform: uppercase; letter-spacing: 0.04em; }
  .input-row { padding: 12px 16px; border-top: 1px solid var(--border); display: flex; gap: 8px; }
  textarea { flex: 1; background: var(--bg-elev); border: 1px solid var(--border); color: var(--fg); padding: 10px 12px;
    border-radius: 8px; font: inherit; resize: none; min-height: 42px; max-height: 160px; }
  textarea:focus { outline: none; border-color: var(--accent); }
  button { background: var(--accent); color: var(--accent-fg); border: 0; padding: 0 16px; border-radius: 8px;
    font: inherit; font-weight: 500; cursor: pointer; min-width: 84px; }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  button:hover:not(:disabled) { opacity: 0.9; }
  .examples { padding: 0 16px 12px; display: flex; flex-wrap: wrap; gap: 6px; }
  .example { background: transparent; color: var(--muted); border: 1px solid var(--border);
    padding: 4px 10px; border-radius: 999px; font-size: 12px; cursor: pointer; min-width: 0; }
  .example:hover { color: var(--fg); border-color: var(--fg); }
  .empty { color: var(--muted); text-align: center; padding: 40px 20px; font-size: 13px; }
</style>
</head>
<body>
<header>
  <h1>AIWander</h1>
  <span class="tagline">Local LLM agent · gpt-oss-20B + Nemotron-3-Super-120B · AMD MI300X</span>
  <div class="status">
    <span id="model-pill" class="pill">…</span>
    <span id="server-pill" class="pill">…</span>
    <span id="health-pill" class="pill">…</span>
  </div>
</header>
<main>
  <section class="pane">
    <div class="pane-head">Chat</div>
    <div class="scroll" id="chat-scroll">
      <div class="empty" id="chat-empty">
        Ask the agent to navigate the web, scrape a page, or chain tool calls.<br />
        Everything runs on a single local LLM — no external API calls.
      </div>
    </div>
    <div class="examples">
      <button class="example" data-prompt="Navigate to example.com and tell me the heading.">Navigate to example.com</button>
      <button class="example" data-prompt="What's the current weather in New York City? Find a public source.">Weather in NYC</button>
      <button class="example" data-prompt="Search Hacker News for stories about AMD GPUs and summarize the top 3.">HN AMD stories</button>
    </div>
    <div class="input-row">
      <textarea id="prompt" placeholder="Ask anything…" rows="1"></textarea>
      <button id="send" type="button">Send</button>
    </div>
  </section>
  <section class="pane">
    <div class="pane-head">Activity</div>
    <div class="scroll" id="activity-scroll">
      <div class="empty">Tool calls and reasoning will appear here as the agent works.</div>
    </div>
  </section>
</main>
<script>
const $ = (s) => document.querySelector(s);
const chatScroll = $('#chat-scroll');
const activityScroll = $('#activity-scroll');
const chatEmpty = $('#chat-empty');
const promptEl = $('#prompt');
const sendBtn = $('#send');

function escape(s) {
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

async function loadStatus() {
  try {
    const r = await fetch('/api/registry', { cache: 'no-store' });
    const d = await r.json();
    const models = (d.models || []).map(m => m.name).join(', ');
    $('#model-pill').textContent = `models: ${d.models?.length || 0}`;
    $('#model-pill').className = 'pill ok';
    $('#model-pill').title = models;
    $('#server-pill').textContent = `mcp: ${d.mcp_servers?.length || 0}`;
    $('#server-pill').className = 'pill ok';
    $('#server-pill').title = (d.mcp_servers || []).map(s => s.name).join(', ');
  } catch (e) {
    $('#model-pill').textContent = 'models: ?'; $('#model-pill').className = 'pill err';
  }
  try {
    const r = await fetch('/api/health', { cache: 'no-store' });
    const d = await r.json();
    $('#health-pill').textContent = d.status === 'ok' ? 'driver: ok' : 'driver: ?';
    $('#health-pill').className = d.status === 'ok' ? 'pill ok' : 'pill err';
  } catch (e) {
    $('#health-pill').textContent = 'driver: down'; $('#health-pill').className = 'pill err';
  }
}

function addUserMessage(text) {
  if (chatEmpty) chatEmpty.remove();
  const d = document.createElement('div');
  d.className = 'msg user';
  d.textContent = text;
  chatScroll.appendChild(d);
  chatScroll.scrollTop = chatScroll.scrollHeight;
}

function addAssistantMessage(text) {
  const d = document.createElement('div');
  d.className = 'msg assistant';
  const pre = document.createElement('pre');
  pre.textContent = text;
  d.appendChild(pre);
  chatScroll.appendChild(d);
  chatScroll.scrollTop = chatScroll.scrollHeight;
  return pre;
}

function addIteration(n) {
  const d = document.createElement('div');
  d.className = 'iter';
  d.textContent = `Iteration ${n}`;
  activityScroll.appendChild(d);
}

function addToolCall(id, name, args, iteration) {
  const d = document.createElement('div');
  d.className = 'tool-call';
  d.dataset.id = id;
  d.innerHTML = `<div><span class="name">${escape(name)}</span></div><div class="args">${escape(args).slice(0, 300)}</div>`;
  activityScroll.appendChild(d);
  activityScroll.scrollTop = activityScroll.scrollHeight;
  return d;
}

function addToolResult(id, ok, content) {
  const tc = activityScroll.querySelector(`[data-id="${id}"]`);
  if (!tc) return;
  const r = document.createElement('div');
  r.className = `result ${ok ? 'ok' : 'err'}`;
  r.textContent = String(content).slice(0, 500);
  tc.appendChild(r);
  activityScroll.scrollTop = activityScroll.scrollHeight;
}

async function send() {
  const text = promptEl.value.trim();
  if (!text) return;
  promptEl.value = '';
  sendBtn.disabled = true;
  sendBtn.textContent = '…';
  addUserMessage(text);
  if (activityScroll.querySelector('.empty')) activityScroll.innerHTML = '';

  let assistantPre = null;

  try {
    const r = await fetch('/api/run', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ user_prompt: text, max_iterations: 8 }),
    });
    if (!r.ok) {
      addAssistantMessage(`Error: HTTP ${r.status}`);
      return;
    }
    const reader = r.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      let lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data:')) continue;
        const json = line.slice(5).trim();
        if (!json) continue;
        try {
          const ev = JSON.parse(json);
          if (ev.type === 'iteration_start') addIteration(ev.iteration);
          else if (ev.type === 'tool_call') addToolCall(ev.id, ev.name, ev.args || '', ev.iteration);
          else if (ev.type === 'tool_result') addToolResult(ev.id, ev.ok, ev.content || '');
          else if (ev.type === 'final_answer') {
            if (!assistantPre) assistantPre = addAssistantMessage('');
            assistantPre.textContent = ev.content || '';
          }
        } catch (e) { /* ignore parse errors */ }
      }
    }
    if (!assistantPre) addAssistantMessage('(done)');
  } catch (e) {
    addAssistantMessage(`Error: ${e.message}`);
  } finally {
    sendBtn.disabled = false;
    sendBtn.textContent = 'Send';
  }
}

sendBtn.addEventListener('click', send);
promptEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});
document.querySelectorAll('.example').forEach(b => {
  b.addEventListener('click', () => { promptEl.value = b.dataset.prompt; promptEl.focus(); });
});

loadStatus();
setInterval(loadStatus, 30000);
</script>
</body>
</html>
